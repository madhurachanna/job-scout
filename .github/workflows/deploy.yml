name: Deploy Job Scout to EC2

on:
  push:
    branches: [main]

jobs:
  # ── 1. Build Docker Image ───────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t job-scout:latest .

      - name: Save image to tarball
        run: docker save job-scout:latest | gzip > job-scout.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: job-scout-image
          path: job-scout.tar.gz
          retention-days: 1

  # ── 2. Deploy to EC2 ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: job-scout-image
          path: .

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: job-scout.tar.gz
          target: /home/${{ secrets.EC2_USER }}/job-scout/

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.yml
          target: /home/${{ secrets.EC2_USER }}/job-scout/

      - name: Write .env and deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/job-scout

            # ── Write .env from GitHub secrets ──────────────────
            cat > .env <<'ENVEOF'
            LLM_BASE_URL=${{ secrets.LLM_BASE_URL }}
            LLM_MODEL_NAME=${{ secrets.LLM_MODEL_NAME }}
            LLM_TEMPERATURE=${{ secrets.LLM_TEMPERATURE }}
            LLM_MAX_TOKENS=${{ secrets.LLM_MAX_TOKENS }}
            REQUEST_TIMEOUT=${{ secrets.REQUEST_TIMEOUT }}
            MAX_RETRIES=${{ secrets.MAX_RETRIES }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            NOTIFY_EMAIL=${{ secrets.NOTIFY_EMAIL }}
            ENVEOF

            # ── Ensure data / output dirs exist (volume mounts) ─
            mkdir -p data output

            # ── Load the new Docker image ────────────────────────
            docker load < job-scout.tar.gz

            # ── Bring up the container ───────────────────────────
            docker compose down --remove-orphans || true
            docker compose up -d

            echo "✅ Deploy complete."

      - name: Smoke test — wait for server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/job-scout
            echo "⏳ Waiting for server to become healthy..."
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/status || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ Server is up (HTTP $STATUS)"
                exit 0
              fi
              echo "  attempt $i: HTTP $STATUS — retrying in 5s..."
              sleep 5
            done
            echo "❌ Server did not become healthy within 60s"
            docker compose logs --tail=50
            exit 1
